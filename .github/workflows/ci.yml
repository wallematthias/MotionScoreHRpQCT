name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Tests (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run test suite
        run: python -m pytest -q

  pip-install-smoke:
    name: Pip Install Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Fresh install from built wheel
        run: |
          python -m pip install --upgrade pip
          python -c "from pathlib import Path; import subprocess, sys; wheels=sorted(Path('dist').glob('*.whl')); assert wheels, 'No wheel found in dist/'; print(f'Installing wheel: {wheels[0]}'); subprocess.check_call([sys.executable, '-m', 'pip', 'install', str(wheels[0])])"

      - name: Import smoke test
        run: |
          python -c "import motionscore; print(motionscore.__version__)"

      - name: CLI smoke test
        run: motionscore --help

  linux-wheel-build:
    name: Linux wheel build check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Validate wheel tag
        run: |
          python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path('dist').glob('*.whl'))
          if not wheels:
              raise SystemExit('No wheel found in dist/')
          for wheel in wheels:
              print(wheel.name)
              if 'py3-none-any' not in wheel.name:
                  raise SystemExit(f'Unexpected wheel tag for pure-python package: {wheel.name}')
          PY

  coverage:
    name: Coverage (ubuntu, py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run coverage
        run: |
          python -m pytest -q \
            --cov=motionscore \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
