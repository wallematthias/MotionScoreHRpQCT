name: Publish To PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import os

          ref_type = os.environ.get("GITHUB_REF_TYPE", "")
          if ref_type and ref_type != "tag":
              print(f"Skipping tag/version check for non-tag ref type: {ref_type}")
              raise SystemExit(0)

          init_file = Path("motionscore/__init__.py")
          text = init_file.read_text(encoding="utf-8")
          init_match = re.search(r'__version__\s*=\s*"([^"]+)"', text)
          if not init_match:
              raise SystemExit("Could not find __version__ in motionscore/__init__.py")
          init_version = init_match.group(1)

          setup_file = Path("setup.py")
          setup_text = setup_file.read_text(encoding="utf-8")
          setup_match = re.search(r"version\s*=\s*['\"]([^'\"]+)['\"]", setup_text)
          if not setup_match:
              raise SystemExit("Could not find version in setup.py")
          setup_version = setup_match.group(1)

          if init_version != setup_version:
              raise SystemExit(
                  f"Version mismatch: motionscore/__init__.py has '{init_version}' "
                  f"but setup.py has '{setup_version}'."
              )

          package_version = init_version
          tag = os.environ.get("GITHUB_REF_NAME", "")
          expected = f"v{package_version}"
          print(f"Tag: {tag} | Package version: {package_version}")
          if tag and tag != expected:
              raise SystemExit(
                  f"Release tag/version mismatch. Expected tag '{expected}', got '{tag}'."
              )
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Twine check
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/motionscorehrpqct

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
